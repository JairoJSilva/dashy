
services:
  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/user-data
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/services/healthcheck"]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s
